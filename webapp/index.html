<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Бильярд Клуб</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- ── HOME ───────────────────────────────────────── -->
    <div class="screen active" id="screen-home">
      <div class="header-card clickable" onclick="openMyProfile()">
        <div class="profile-block">
          <div class="avatar-wrap">
            <img class="avatar" id="user-photo" src="" alt="" />
            <div class="avatar avatar-fallback" id="user-initials"></div>
          </div>
          <div class="profile-name" id="user-name">—</div>
          <div class="profile-sub" id="user-username"></div>
        </div>
        <div class="header-stats">
          <div class="header-stat">
            <div class="header-stat-num" id="stat-games">—</div>
            <div class="header-stat-label">Игр</div>
          </div>
          <div class="header-stat-divider"></div>
          <div class="header-stat">
            <div class="header-stat-num" id="stat-wins">—</div>
            <div class="header-stat-label">Побед</div>
          </div>
          <div class="header-stat-divider"></div>
          <div class="header-stat">
            <div class="header-stat-num" id="stat-winrate">—</div>
            <div class="header-stat-label">Винрейт</div>
          </div>
        </div>
      </div>
      <div class="content">
        <div class="section">
          <div class="section-header">
            <div class="section-title-row">
              <span class="section-icon">📋</span>
              <span class="section-title">Последние игры</span>
            </div>
          </div>
          <div class="card-list" id="recent-games"></div>
        </div>
      </div>
    </div>

    <!-- ── ADD GAME ────────────────────────────────────── -->
    <div class="screen" id="screen-add">
      <div class="page-header">
        <h1 class="page-title">Добавить игру</h1>
      </div>
      <div class="content">
        <div class="form-card">

          <!-- Score with player labels -->
          <div class="form-group">
            <label class="form-label">Счёт</label>
            <div class="score-row">
              <div class="score-col">
                <input class="score-input" type="number" id="add-score-me" min="0" max="30" placeholder="0" />
                <div class="score-player-label" id="score-label-me">Я</div>
              </div>
              <div class="score-divider">:</div>
              <div class="score-col">
                <input class="score-input" type="number" id="add-score-opp" min="0" max="30" placeholder="0" />
                <div class="score-player-label" id="score-label-opp">Соперник</div>
              </div>
            </div>
          </div>

          <!-- Custom opponent selector -->
          <div class="form-group">
            <label class="form-label">Соперник</label>
            <div class="custom-select" id="opponent-select">
              <div class="custom-select-trigger" id="opponent-trigger" onclick="toggleSelect()">
                <span id="opponent-display" class="custom-select-placeholder">Выбери соперника...</span>
                <span class="custom-select-arrow">▾</span>
              </div>
              <div class="custom-select-dropdown" id="opponent-dropdown">
                <div class="custom-select-search-wrap">
                  <input class="custom-select-search" id="opponent-search" type="text"
                    placeholder="Поиск по имени или #ID..." oninput="filterOpponents(this.value)" autocomplete="off" />
                </div>
                <div class="custom-select-list" id="opponent-list"></div>
              </div>
            </div>
            <input type="hidden" id="add-opponent" value="" />
          </div>

          <!-- Date -->
          <div class="form-group">
            <label class="form-label">Дата</label>
            <input class="form-input" type="date" id="add-date" />
          </div>

          <button class="primary-btn" onclick="submitGame()">Записать игру</button>
        </div>
      </div>
    </div>

    <!-- ── PLAYERS ─────────────────────────────────────── -->
    <div class="screen" id="screen-players">
      <div class="page-header">
        <h1 class="page-title">Игроки</h1>
        <div class="page-subtitle">Рейтинг по винрейту</div>
      </div>
      <div class="content">
        <div class="card-list" id="all-players"></div>
      </div>
    </div>

    <!-- ── PLAYER PROFILE ──────────────────────────────── -->
    <div class="screen" id="screen-player">
      <div class="header-card" id="player-profile-header">
        <button class="back-btn" onclick="goBack()">← Назад</button>
        <div class="profile-block" style="margin-top:8px">
          <div class="avatar avatar-fallback avatar-lg" id="player-avatar-lg"></div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="profile-name" id="player-profile-name">—</div>
            <div class="player-id-badge" id="player-profile-id"></div>
          </div>
        </div>
        <div class="header-stats" style="margin-top:16px">
          <div class="header-stat">
            <div class="header-stat-num" id="player-stat-games">—</div>
            <div class="header-stat-label">Игр</div>
          </div>
          <div class="header-stat-divider"></div>
          <div class="header-stat">
            <div class="header-stat-num" id="player-stat-wins">—</div>
            <div class="header-stat-label">Побед</div>
          </div>
          <div class="header-stat-divider"></div>
          <div class="header-stat">
            <div class="header-stat-num" id="player-stat-wr">—</div>
            <div class="header-stat-label">Винрейт</div>
          </div>
        </div>
      </div>
      <div class="content" id="player-profile-content"></div>
    </div>

    <!-- ── MY PROFILE ─────────────────────────────────── -->
    <div class="screen" id="screen-myprofile">
      <div class="header-card">
        <button class="back-btn" onclick="goBack()">← Назад</button>
        <div class="profile-block" style="margin-top:8px">
          <div class="avatar-wrap">
            <img class="avatar" id="my-profile-photo" src="" alt="" />
            <div class="avatar avatar-fallback" id="my-profile-initials"></div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="profile-name" id="my-profile-name">—</div>
            <div class="player-id-badge" id="my-profile-id"></div>
          </div>
        </div>
        <div class="header-stats" style="margin-top:16px">
          <div class="header-stat">
            <div class="header-stat-num" id="my-stat-games">—</div>
            <div class="header-stat-label">Игр</div>
          </div>
          <div class="header-stat-divider"></div>
          <div class="header-stat">
            <div class="header-stat-num" id="my-stat-wins">—</div>
            <div class="header-stat-label">Побед</div>
          </div>
          <div class="header-stat-divider"></div>
          <div class="header-stat">
            <div class="header-stat-num" id="my-stat-wr">—</div>
            <div class="header-stat-label">Винрейт</div>
          </div>
        </div>
      </div>
      <div class="content" id="my-profile-content"></div>
    </div>

    <!-- ── GAME DETAIL ────────────────────────────────── -->
    <div class="screen" id="screen-game">
      <div class="game-detail-header" id="game-detail-header">
        <div class="game-detail-topbar">
          <button class="back-btn" onclick="goBack()">← Назад</button>
        </div>
        <div class="game-detail-result" id="game-detail-result"></div>
        <div class="game-detail-score" id="game-detail-score"></div>
        <div class="game-detail-date" id="game-detail-date"></div>
        <div class="game-detail-players">
          <div class="game-detail-player">
            <div class="game-detail-avatar" id="game-detail-av1"></div>
            <div class="game-detail-pname" id="game-detail-n1"></div>
          </div>
          <div class="game-detail-player">
            <div class="game-detail-avatar" id="game-detail-av2"></div>
            <div class="game-detail-pname" id="game-detail-n2"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── BOTTOM NAV ─────────────────────────────────── -->
    <nav class="bottom-nav">
      <button class="nav-item active" onclick="switchTab('home')" data-tab="home">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Главная</span>
      </button>
      <button class="nav-item nav-add" onclick="switchTab('add')" data-tab="add">
        <span class="nav-icon-add">+</span>
      </button>
      <button class="nav-item" onclick="switchTab('players')" data-tab="players">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">Игроки</span>
      </button>
    </nav>

  </div>
  <script src="app.js"></script>
</body>
</html>
